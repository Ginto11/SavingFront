<div class="dark:bg-gray-700 shadow-md p-6 w-full max-w-sm rounded-lg overflow-hidden mx-auto">
    <div class="flex justify-between">
        <div class="inline-block bg-[#edf2f7] rounded-lg py-2 px-3">
            <img class="w-5" src="/images/estrella.png" alt="Icono de meta">
        </div>
        <div class="flex gap-4">
            <button 
                [disabled]="meta.estado != 'Activa'"
                (click)="abrirModalCancelarMeta(meta.id);">
                <i class="pi pi-trash" [title]="'Cancelar meta' + meta.nombre"
                    [ngClass]="{
                    'cursor-not-allowed text-gray-400': meta.estado == 'Cumplida' || 'Cancelada',
                    'cursor-pointer text-red-400': meta.estado == 'Activa'
                }"></i></button>

            <button 
                [disabled]="meta.estado != 'Activa'"
                (click)="abrirModalActualizacion(meta)">
                <i class="pi pi-pencil" [title]="'Actualizar meta' + meta.nombre"
                    [ngClass]="{
                    'cursor-not-allowed text-gray-400': meta.estado == 'Cumplida' || 'Cancelada',
                    'cursor-pointer text-yellow-400': meta.estado == 'Activa'
                }"></i></button>
        </div>
    </div>

    <div class="mt-4">
        <h3 class="text-xl font-semibold text-blue-700 dark:text-green-200"> {{ meta.nombre }} </h3>
    </div>

    <div class="mt-6">
        <div class="mb-2">
            <p class="text-gray-700 dark:text-white"><strong>Estado: </strong> <span [ngClass]="{
                'text-green-500': meta.estado == 'Activa',
                'text-yellow-500': meta.estado == 'Cumplida',
                'text-red-400': meta.estado == 'Cancelada'
            }">{{ meta.estado }}</span> </p>
        </div>
        <div class="flex mb-2">
            <p class="text-sm text-gray-500 dark:text-gray-400 flex-1"> $ {{ (meta.montoActual) ? (meta.montoActual | currency:'
                ':'symbol':'1.0-0') : '0' }} </p>
            <p class="text-sm text-gray-500 dark:text-gray-400"> $ {{ meta.montoObjetivo | currency:' ':'symbol':'1.0-0'}} </p>
        </div>
        <div class="bg-gray-600 rounded-full w-full h-2.5 mb-1">
            <div class="h-full rounded-full bg-blue-200 dark:bg-green-200 flex items-center"
                [ngStyle]="{ width: (meta.montoActual) ? ((meta.montoActual * 100) / meta.montoObjetivo) + '%' : '0%' }">
            </div>
        </div>
        <hr class="text-gray-400/50">
    </div>
</div>
