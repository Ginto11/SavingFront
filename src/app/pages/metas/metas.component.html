<section class="text-gray-600 body-font w-full p-6">
    <div class="mb-6">
        <h2 class="text-2xl font-semibold text-white">Metas</h2>
        <p class="text-sm text-gray-300">
            En esta sección podras administrar las metas que tengas creadas, desde actualizarlas, eliminarlas hasta filtrarlas por estado.
        </p>
    </div>

    <div class="p-4 flex-col md:flex-row flex justify-between items-center bg-gray-800 rounded-xl mb-6 gap-2">
        
        <div class="flex gap-3 w-full md:w-md">
            <input class="w-full! md:w-md p-3 bg-gray-700 text-white rounded-xl outline-none focus:ring-2 focus:ring-green-200" type="search" placeholder="Busque sus metas">
            <button class="bg-green-200 rounded-xl w-10 cursor-pointer"><i class="pi pi-search text-green-900 font-medium"></i></button>
        </div>

        <ul class="w-full md:w-md grid gap-3 text-green-200 grid-cols-3">
            <button (click)="buscarMetasCumplidas('Cumplida')" class="bg-green-200 py-3 rounded-xl text-green-900 font-medium text-center ms:text-sm cursor-pointer">Cumplidas</button>
            <button (click)="buscarMetasCumplidas('Activa')" class="bg-green-200 py-3 rounded-xl text-green-900 font-medium text-center ms:text-sm cursor-pointer">Activas</button>
            <button (click)="buscarMetasCumplidas('Cancelada')" class="bg-green-200 py-3 rounded-xl text-green-900 font-medium text-center ms:text-sm cursor-pointer">Canceladas</button>
        </ul>
    </div>

    <div class="p-4 bg-gray-800 rounded-xl grid grid-cols-1 md:grid-cols-3 sm:grid-cols-2 gap-4">
        @if (metas.length > 0) {
            @for(meta of metas; track meta.id){
                <app-card-meta [meta]="meta" />
            }
        }@else {
            <p class="text-gray-400">No se encontraron metas en estado.</p>
        }
    </div>

</section>
